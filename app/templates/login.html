<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - {{ app_name }}</title>
    <link rel="stylesheet" href="/static/css/themes/{{ theme }}.css">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <main style="max-width:360px;margin:10vh auto;padding:var(--spacing-xl);">
        <h1 style="margin-bottom:var(--spacing-lg)">{{ app_name }}</h1>
        {% if error %}
        <p class="widget-error" role="alert">{{ error }}</p>
        {% endif %}
        <form method="post" action="/login">
            <input type="hidden" name="next" value="{{ next }}">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autofocus
                   style="width:100%;margin:var(--spacing-sm) 0 var(--spacing-lg)">
            <button type="submit" class="btn btn-primary" style="width:100%">Sign in</button>
        </form>
    </main>
</body>
</html>
